  --peach: #e8c4a2;
  --peach-deep: #c4875a;
  --forest: #3d5a40;
  --forest-light: #5c7a60;
  --ink: #2c2416;
  --ink-mid: #5c4e3a;
  --ink-light: #8a7b66;
  --sand: #f5efe4;
  --sand-dark: #e6ddd0;
  --card-bg: #ffffff;
  --accent: #c4875a;
  --accent-light: #f5e1d0;
  --vote-selected: #e8c4a2;
  --shadow-sm: 0 1px 3px rgba(60,40,20,0.06);
  --shadow-md: 0 4px 24px rgba(60,40,20,0.08);
  --shadow-lg: 0 12px 40px rgba(60,40,20,0.12);
  --radius: 16px;
  --radius-sm: 10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {

  background: var(--warm-cream);
  color: var(--ink);
  line-height: 1.75;
  -webkit-font-smoothing: antialiased;
}

.hero-content { position: relative; text-align: center; padding: 3rem 2rem; max-width: 800px; z-index: 1; }
.hero-badge {

  border-radius: 50px;
  color: #fff;
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  margin-bottom: 2rem;
}
.hero h1 {

  font-size: clamp(2.2rem, 5vw, 3.6rem);
  font-weight: 900;
  color: #fff;
  line-height: 1.4;
  text-shadow: 0 2px 30px rgba(60,30,10,0.25);
  margin-bottom: 1.2rem;
}
.hero h1 em {

  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

}
.hero p {
  font-size: 1.1rem;
  color: rgba(255,255,255,0.88);
  font-weight: 300;
  line-height: 1.9;
  max-width: 560px;
  margin: 0 auto 2rem;
}
.hero-tags { display: flex; flex-wrap: wrap; gap: 0.6rem; justify-content: center; }
.hero-tags span {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.2);
  padding: 0.35rem 1.1rem;
  border-radius: 50px;
  font-size: 0.82rem;
  color: rgba(255,255,255,0.92);
  font-weight: 400;
}
.hero-scroll { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); animation: bounce 2s infinite; opacity: 0.5; }
.hero-scroll svg { width: 24px; height: 24px; stroke: #fff; }
@keyframes bounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(8px); }
}

/* ─── Constraints Bar ──────────────────── */
.constraints {
  background: #fff; border-bottom: 1px solid var(--sand-dark);
  padding: 1rem 2rem; position: sticky; top: 0; z-index: 100;
  display: flex; flex-wrap: wrap; gap: 1.2rem; justify-content: center; align-items: center;
  box-shadow: var(--shadow-sm);
}
.constraint-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.82rem; color: var(--ink-mid); font-weight: 500; }
.constraint-item .icon { font-size: 1rem; }

/* ─── Section ──────────────────────────── */
.section { max-width: 1200px; margin: 0 auto; padding: 4.5rem 2rem; }
.section-alt { background: #fff; }
.section-header { text-align: center; margin-bottom: 3rem; }
.section-label {
  display: inline-block; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--forest); background: rgba(61,90,64,0.08); padding: 0.35rem 1.1rem; border-radius: 50px; margin-bottom: 0.8rem;
}
.section-header h2 {
  font-family: 'Noto Serif SC', serif; font-size: 2rem; font-weight: 700; color: var(--ink); margin-bottom: 0.3rem;
}
.section-header .price {
  font-size: 2.6rem; font-weight: 900; color: var(--accent); font-family: 'Noto Serif SC', serif;
}
.section-header p { color: var(--ink-light); font-size: 0.95rem; max-width: 500px; margin: 0.4rem auto 0; }

/* ─── Cards Grid ───────────────────────── */
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 2rem; }
.card {
  background: var(--card-bg); border-radius: var(--radius); overflow: hidden;
  box-shadow: var(--shadow-md); transition: transform 0.3s ease, box-shadow 0.3s ease; cursor: pointer; position: relative;
  border: 1px solid var(--sand-dark);
}
.card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
.card-img { height: 200px; background-size: cover; background-position: center; position: relative; transition: transform 0.5s ease; }
.card:hover .card-img { transform: scale(1.03); }
.card-img::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 60%;
  background: linear-gradient(to top, rgba(30,15,5,0.55), transparent);
}
.card-badge { position: absolute; top: 1rem; left: 1rem; background: rgba(0,0,0,0.4); backdrop-filter: blur(6px); color: #fff; padding: 0.25rem 0.85rem; border-radius: 50px; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.05em; z-index: 2; }
.card-rank { position: absolute; top: 1rem; right: 1rem; background: var(--accent); color: #fff; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.82rem; z-index: 2; box-shadow: 0 2px 10px rgba(196,135,90,0.4); }
.card-body { padding: 1.5rem; }
.card-body h3 { font-family: 'Noto Serif SC', serif; font-size: 1.35rem; font-weight: 700; margin-bottom: 0.25rem; color: var(--ink); }
.card-body .subtitle { font-size: 0.83rem; color: var(--forest-light); font-weight: 500; margin-bottom: 1rem; }
.card-meta { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
.meta-item { display: flex; align-items: center; gap: 0.3rem; font-size: 0.78rem; color: var(--ink-mid); }
.meta-item .dot { width: 6px; height: 6px; border-radius: 50%; }
.dot-green { background: #6abf69; }
.dot-blue { background: #64b5f6; }
.dot-orange { background: #ffb74d; }
.dot-red { background: #ef5350; }
.card-cost { background: var(--warm-cream); border-radius: var(--radius-sm); padding: 0.9rem 1.1rem; margin-bottom: 1rem; }
.card-cost .total { font-size: 1.2rem; font-weight: 700; color: var(--ink); line-height: 1.5; }
.card-cost .total span { font-size: 0.78rem; font-weight: 400; color: var(--ink-light); }
.card-cost .detail-line { font-size: 0.75rem; color: var(--ink-light); margin-top: 0.35rem; line-height: 1.5; }
.card-detail { max-height: 0; overflow: hidden; transition: max-height 0.6s ease; }
.card.expanded .card-detail { max-height: 3000px; }
.card.expanded .card-expand svg { transform: rotate(180deg); }
.card-expand { display: flex; align-items: center; gap: 0.3rem; font-size: 0.83rem; color: var(--forest); font-weight: 500; padding-top: 0.6rem; border-top: 1px solid var(--sand-dark); margin-top: 0.5rem; user-select: none; }
.card-expand svg { width: 14px; height: 14px; transition: transform 0.3s ease; }
.card-detail-inner { padding-top: 1rem; color: var(--ink); }
.day-item { display: flex; gap: 0.8rem; margin-bottom: 1rem; font-size: 0.88rem; line-height: 1.65; color: var(--ink); }
.day-num { flex-shrink: 0; width: 34px; height: 34px; border-radius: 50%; background: var(--forest); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.78rem; }
.xhs-ref { font-size: 0.74rem; color: var(--ink-light); margin-top: 0.8rem; padding-top: 0.8rem; border-top: 1px dashed var(--sand-dark); }

.card-map { width: 100%; min-height: 280px; height: 280px; border-radius: var(--radius-sm); margin-top: 1rem; border: 1px solid var(--sand-dark); z-index: 1; background: var(--sand); }

/* ─── Safety Section ───────────────────── */
.safety { background: linear-gradient(180deg, var(--forest) 0%, #2d4a33 100%); color: #fff; padding: 5rem 2rem; }
.safety-inner { max-width: 1000px; margin: 0 auto; }
.safety h2 { font-family: 'Noto Serif SC', serif; font-size: 2rem; text-align: center; margin-bottom: 2.5rem; color: #fff; }
.safety-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }

.safety-card p { font-size: 0.83rem; opacity: 0.78; line-height: 1.6; color: rgba(255,255,255,0.85); }

/* ─── Comparison Table ─────────────────── */
.compare { background: #fff; padding: 4.5rem 2rem; }
.compare-inner { max-width: 1000px; margin: 0 auto; overflow-x: auto; }
.compare h2 { font-family: 'Noto Serif SC', serif; font-size: 2rem; text-align: center; margin-bottom: 2.5rem; color: var(--ink); }
.compare-table { width: 100%; border-collapse: collapse; font-size: 0.86rem; color: var(--ink); }
.compare-table th { background: var(--forest); color: #fff; padding: 0.9rem 1rem; font-weight: 600; font-size: 0.82rem; text-align: left; }
.compare-table th:first-child { border-radius: var(--radius-sm) 0 0 0; }
.compare-table th:last-child { border-radius: 0 var(--radius-sm) 0 0; }
.compare-table td { padding: 0.9rem 1rem; border-bottom: 1px solid var(--sand-dark); color: var(--ink); }

.tier-low { background: #e8f0e6; color: var(--forest); }
.tier-mid { background: #fdf0e4; color: var(--accent); }
.tier-high { background: #fce8e4; color: #c04a3a; }

/* ─── Vote Section ─────────────────────── */
.vote { padding: 4.5rem 2rem; }
.vote-inner { max-width: 1100px; margin: 0 auto; }
.vote h2 { font-family: 'Noto Serif SC', serif; font-size: 2rem; text-align: center; margin-bottom: 1rem; color: var(--ink); }

.vote-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; }
.vote-card {

  border: 2px solid var(--sand-dark); user-select: none;
  position: relative;

.vote-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.vote-card.selected { border-color: var(--accent); background: var(--accent-light); }
.vote-card .vc-icon { font-size: 2rem; margin-bottom: 0.5rem; }
.vote-card .vc-name { font-size: 0.88rem; font-weight: 600; color: var(--ink); margin-bottom: 0.15rem; }
.vote-card .vc-tier { font-size: 0.72rem; color: var(--ink-light); }
.vote-card .vc-check {
  position: absolute; top: 8px; right: 10px;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--accent); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; opacity: 0; transform: scale(0.5);
  transition: all 0.25s ease;
}
.vote-card.selected .vc-check { opacity: 1; transform: scale(1); }
.vote-bar { text-align: center; margin-top: 2rem; }
.vote-bar .vote-count { font-size: 0.9rem; color: var(--ink-mid); }
.vote-bar .vote-reset { display: inline-block; margin-top: 0.6rem; font-size: 0.78rem; color: var(--ink-light); cursor: pointer; text-decoration: underline; }

/* ─── Footer ───────────────────────────── */
.footer { background: var(--ink); color: rgba(255,255,255,0.45); text-align: center; padding: 2rem; font-size: 0.78rem; }
.footer a { color: var(--peach); text-decoration: none; }

/* ─── Animations ───────────────────────── */
@keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
.card { animation: fadeUp 0.6s ease backwards; }
.card:nth-child(1) { animation-delay: 0.1s; }
.card:nth-child(2) { animation-delay: 0.2s; }
.card:nth-child(3) { animation-delay: 0.3s; }

/* ─── Responsive ───────────────────────── */
@media (max-width: 768px) {
  .hero { min-height: 50vh; }
  .hero h1 { font-size: 1.7rem; }
  .section { padding: 2.5rem 1rem; }
  .cards { grid-template-columns: 1fr; }
  .constraints { gap: 0.8rem; padding: 0.8rem 1rem; }
  .constraint-item { font-size: 0.72rem; }
  .vote-grid { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); }
}
@media (max-width: 480px) {
  .card-body h3 { font-size: 1.15rem; }
  .section-header h2 { font-size: 1.5rem; }
  .card-cost .total { font-size: 1rem; }
}
</style>

<script>
(function(){
  const C = CONTENT;

  // ── Helper: build DOM from template literal ──
  function h(tpl, ...vals) {
    const t = document.createElement('template');
    let s = tpl[0];
    for (let i=0; i<vals.length; i++) s += String(vals[i]) + tpl[i+1];
    t.innerHTML = s.trim();
    return t.content.firstChild;
  }

  // ── Render Hero ──
  (function(){
    const el = h`
      <header class="hero">
        <div class="hero-content">
          <div class="hero-badge">${C.hero.badge}</div>
          <h1>${C.hero.title}</h1>
          <p>${C.hero.subtitle}</p>
          <div class="hero-tags">${C.hero.tags.map(t => `<span>${t}</span>`).join('')}</div>
        </div>
        <div class="hero-scroll">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
        </div>
      </header>`;
    document.body.appendChild(el);
  })();

  // ── Render Constraints Bar ──
  (function(){
    const el = h`<div class="constraints">${C.constraints.map(c => `<div class="constraint-item"><span class="icon">${c.icon}</span> ${c.text}</div>`).join('')}</div>`;
    document.body.appendChild(el);
  })();

  // ── Render One Card ──
  function renderCard(d) {
    const metaHtml = d.meta.map(m => `<span class="meta-item"><span class="dot ${m.dot}"></span> ${m.text}</span>`).join('');
    const itinHtml = d.itinerary.map((day,i) => `<div class="day-item"><div class="day-num">D${i+1}</div><div>${day}</div></div>`).join('');
    return h`
      <div class="card" data-id="${d.id}">
        <div class="card-img" style="background-image:url('${d.image}'), ${d.imageBg};">
          <span class="card-badge">${d.badge}</span>
          <span class="card-rank">${d.rank}</span>
        </div>
        <div class="card-body">
          <h3>${d.name}</h3>
          <p class="subtitle">${d.subtitle}</p>
          <div class="card-meta">${metaHtml}</div>
          <div class="card-cost">
            <div class="total"><span style="font-size:0.75rem;font-weight:400">杭州</span> ≈${d.hzCost.toLocaleString()} <span>元</span> &nbsp; <span style="font-size:0.75rem;font-weight:400">合肥</span> ≈${d.hfCost.toLocaleString()} <span>元</span></div>
            <div class="detail-line">${d.costDetail}</div>
          </div>
          <div class="card-expand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg> 展开详细行程</div>
          <div class="card-detail">
            <div class="card-detail-inner">${itinHtml}<div class="xhs-ref">${d.xhs}</div></div>
          </div>
        </div>
      </div>`;
  }

  // ── Render Tier Section ──
  function renderTier(tier, tierIdx) {
    const sec = document.createElement('section');
    sec.className = 'section' + (tier.bgWhite ? ' section-alt' : '');
    sec.id = tier.id;
    const cardsHtml = tier.destinations.map(renderCard).map(el => el.outerHTML).join('');
    sec.innerHTML = `
      <div class="section-header">
        <div class="section-label">${tier.label}</div>
        <div class="price">${tier.price}</div>
        <h2>${tier.title}</h2>
        <p>${tier.subtitle}</p>
      </div>
      <div class="cards">${cardsHtml}</div>`;
    document.body.appendChild(sec);

    // Bind card expand + map
    const cards = sec.querySelectorAll('.card');
    cards.forEach(card => {
      const cardId = card.dataset.id;
      const expandBtn = card.querySelector('.card-expand');
      const tierDests = tier.destinations;
      const dest = tierDests.find(dd => dd.id === cardId);

      function toggle() {
        card.classList.toggle('expanded');
        if (card.classList.contains('expanded') && dest && dest.map) {
          initCardMap(card, dest);
        }
      }
      card.addEventListener('click', function(e) {
        if (e.target.closest('a') || e.target.closest('.leaflet-container')) return;
        toggle();
      });
      if (expandBtn) {
        expandBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          toggle();
        });
      }
    });

    // Map init
    function initCardMap(card, dest) {
      const mapId = 'map-' + dest.id;
      if (document.getElementById(mapId)) return;
      const div = document.createElement('div');
      div.className = 'card-map';
      div.id = mapId;
      const di = card.querySelector('.card-detail-inner');
      if (!di) return;
      di.appendChild(div);

      setTimeout(function(){
        const m = dest.map;
        const map = L.map(mapId, {
          center: m.center, zoom: m.zoom,
          zoomControl: true, attributionControl: false, maxZoom: 18
        });
        L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=7&x={x}&y={y}&z={z}', {
          subdomains: ['01','02','03','04'], maxZoom: 18, maxNativeZoom: 17
        }).addTo(map);
        m.points.forEach(function(pt,i){
          L.circleMarker(pt, {
            radius: 7, fillColor: m.colors[i], color: '#fff', weight: 2, fillOpacity: 0.9
          }).bindPopup('<b>' + m.labels[i] + '</b>').addTo(map);
        });
        L.polyline(m.points, {
          color: '#1976d2', weight: 3, opacity: 0.7, dashArray: '8 4'
        }).addTo(map);
        setTimeout(function(){ map.invalidateSize(); }, 100);
      }, 700);
    }
  }

  C.tiers.forEach(function(tier, idx) { renderTier(tier, idx); });

  // ── Render Comparison Table ──
  (function(){
    const tbody = C.comparison.rows.map(function(r){
      const style = r.bg ? ' style="background:#faf9f6;"' : '';
      return `<tr${style}><td><strong>${r.name}</strong></td><td><span class="tier-badge ${r.tierClass}">${r.tier}</span></td><td>${r.drive}</td><td><span class="star">${r.road}</span></td><td>${r.weather}</td><td>${r.rec}</td></tr>`;
    }).join('');
    const el = h`
      <section class="compare">
        <div class="compare-inner">
          <h2>${C.comparison.title}</h2>
          <table class="compare-table">
            <thead><tr>${C.comparison.headers.map(function(th){ return '<th>'+th+'</th>'; }).join('')}</tr></thead>
            <tbody>${tbody}</tbody>
          </table>
        </div>
      </section>`;
    document.body.appendChild(el);
  })();

  // ── Render Safety ──
  (function(){
    const el = h`
      <section class="safety">
        <div class="safety-inner">
          <h2>${C.safety.title}</h2>
          <div class="safety-grid">
            ${C.safety.items.map(function(s){ return '<div class="safety-card"><div class="s-icon">'+s.icon+'</div><h4>'+s.title+'</h4><p>'+s.text+'</p></div>'; }).join('')}
          </div>
        </div>
      </section>`;
    document.body.appendChild(el);
  })();

  // ── Render Vote Section ──
  (function(){
    const VOTE_KEY = 'travel_votes_v2';
    var votes = {};
    try { votes = JSON.parse(localStorage.getItem(VOTE_KEY)) || {}; } catch(e){}

    function saveVotes(){ localStorage.setItem(VOTE_KEY, JSON.stringify(votes)); }

    var allDests = [];
    C.tiers.forEach(function(t){
      t.destinations.forEach(function(d){
        allDests.push({ id:d.id, name:d.name, tier:t.price, icon:(C.vote.icons[allDests.length] || '📍') });
      });
    });

    function renderVoteCards(){
      var count = 0;
      var html = '';
      allDests.forEach(function(d){
        var sel = !!votes[d.id];
        if (sel) count++;
        html += `<div class="vote-card${sel?' selected':''}" data-vid="${d.id}"><div class="vc-check">✓</div><div class="vc-icon">${d.icon}</div><div class="vc-name">${d.name}</div><div class="vc-tier">${d.tier}</div></div>`;
      });
      grid.innerHTML = html;
      barCount.textContent = count ? '你已选了 ' + count + ' 个目的地' : '还没选，点击目的地卡片来投票';
    }

    var el = h`
      <section class="vote">
        <div class="vote-inner">
          <h2>${C.vote.title}</h2>
          <p class="vote-sub">${C.vote.subtitle}</p>
          <div class="vote-grid" id="voteGrid"></div>
          <div class="vote-bar">
            <span class="vote-count" id="voteCount"></span>
            <div class="vote-reset" id="voteReset">清空重选</div>
          </div>
        </div>
      </section>`;
    document.body.appendChild(el);

    var grid = el.querySelector('#voteGrid');
    var barCount = el.querySelector('#voteCount');
    renderVoteCards();

    grid.addEventListener('click', function(e){
      var card = e.target.closest('.vote-card');
      if (!card) return;
      var vid = card.dataset.vid;
      if (votes[vid]) { delete votes[vid]; } else { votes[vid] = true; }
      saveVotes();
      renderVoteCards();
    });

    el.querySelector('#voteReset').addEventListener('click', function(){
      votes = {};
      saveVotes();
      renderVoteCards();
    });
  })();

  // ── Render Footer ──
  (function(){
    var el = h`<footer class="footer"><p>${C.footer}</p></footer>`;
    document.body.appendChild(el);
  })();

})();
</script>

</body>
</html>
